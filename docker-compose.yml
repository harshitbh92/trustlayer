services:
  postgres:
    image: postgres:16-alpine
    container_name: trustlayer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trustlayer
    ports:
      - "5432:5432"
    volumes:
      - trustlayer_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trustlayer"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: trustlayer-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - trustlayer_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  trustlayer_pgdata:
  trustlayer_redisdata:
